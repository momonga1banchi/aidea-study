# Codexデモ用のプロジェクト権限設定。
# デモ中は、プロジェクト外の読み書きとネットワークアクセスを避ける。

default_permissions = "project-only"

[permissions.project-only.filesystem]
":minimal" = "read"

[permissions.project-only.filesystem.":workspace_roots"]
"." = "write"

[permissions.project-only.network]
enabled = false

# Codexデモ用のメモリ設定。
# 悪い例・良い例の比較中は、セッション間のメモリを使わない前提にする。

[features]
memories = false

[memories]
use_memories = false
generate_memories = false
disable_on_external_context = true
